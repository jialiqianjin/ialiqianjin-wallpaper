<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私人壁纸库（jialiqianjin）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }
        body {
            background: #050816;
            background-image: radial-gradient(circle at 50% 20%, #101730 0%, #050816 70%);
            color: #fff;
            min-height: 100vh;
            padding: 2rem 1rem;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        /* 导航栏样式 */
        .nav-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(0, 220, 255, 0.2);
        }
        .nav-btn {
            padding: 10px 30px;
            font-size: 1.1rem;
            border: none;
            border-radius: 8px;
            background: rgba(25, 35, 60, 0.6);
            color: #fff;
            cursor: pointer;
            transition: 0.25s;
            border: 1px solid transparent;
        }
        .nav-btn.active {
            border-color: rgba(0, 220, 255, 0.6);
            box-shadow: 0 0 12px rgba(0, 216, 255, 0.4);
            background: linear-gradient(90deg, #224488, #5522aa);
        }
        .nav-btn:hover {
            box-shadow: 0 0 12px rgba(0, 216, 255, 0.4);
        }
        /* 内容模块 切换隐藏 */
        .module {
            display: none;
        }
        .module.show {
            display: block;
        }
        /* 极域工具卡片 */
        .tool-card {
            background: rgba(25, 35, 60, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 220, 255, 0.25);
            border-radius: 12px;
            padding: 30px;
            max-width: 500px;
            margin: 0 auto 24px auto;
            text-align: center;
        }
        .tool-card h3 {
            font-size: 1.4rem;
            margin-bottom: 15px;
            background: linear-gradient(90deg, #00d8ff, #8b5cf6);
            -webkit-background-clip: text;
            color: transparent;
        }
        .download-exe {
            display: inline-block;
            margin-top: 12px;
            padding: 10px 26px;
            background: linear-gradient(90deg, #0099e5, #6c2bd9);
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.2s;
        }
        .download-exe:hover {
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.4);
        }
        header {
            text-align: center;
            padding: 2rem 0;
            border-bottom: 1px solid rgba(0, 220, 255, 0.2);
            margin-bottom: 2rem;
        }
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00d8ff, #8b5cf6);
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: 6px;
        }
        .desc {
            color: rgba(255,255,0.5);
            margin-top: 0.8rem;
        }
        .tool-bar {
            text-align: center;
            margin-bottom: 1.5rem;
            gap: 12px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }
        .tool-btn {
            padding: 8px 20px;
            background: linear-gradient(90deg, #224488, #5522aa);
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
        }
        .tool-btn:hover {
            box-shadow: 0 0 12px rgba(0, 216, 255, 0.4);
        }
        #import-file {
            display: none;
        }
        .add-link-box {
            background: rgba(25, 35, 60, 0.5);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 220, 255, 0.3);
            border-radius: 16px;
            padding: 2rem;
            text-align: center;
            margin-bottom: 2.5rem;
        }
        #linkInput {
            width: 100%;
            max-width: 800px;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #00a8ff60;
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 14px;
            outline: none;
        }
        #addTempBtn {
            margin-top: 12px;
            padding: 10px 28px;
            background: linear-gradient(90deg, #777, #444);
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            font-size: 1rem;
        }
        .wall-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 24px;
        }
        .wall-card {
            background: rgba(25, 35, 60, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 220, 255, 0.25);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .wall-card:hover {
            transform: translateY(-8px);
            border-color: rgba(0, 220, 255, 0.6);
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.35);
        }
        .wall-card img,
        .wall-card video {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
            cursor: pointer;
        }
        .wall-card video {
            background: #000;
        }
        .card-action {
            padding: 15px;
            text-align: center;
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .down-btn {
            padding: 7px 16px;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            font-size: 0.85rem;
            transition: 0.2s;
            border: none;
            cursor: pointer;
            background: linear-gradient(90deg, #0099e5, #6c2bd9);
        }
        .empty {
            grid-column: 1 / -1;
            text-align: center;
            color: rgba(255,255,0.3);
            padding: 3rem 0;
        }
        .preview-mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.92);
            z-index: 999;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .preview-mask img,
        .preview-mask video {
            max-width: 95%;
            max-height: 95%;
            object-fit: contain;
        }
        .preview-mask video {
            background: #000;
            max-height: 90vh;
        }
        .close-preview {
            position: absolute;
            top: 25px;
            right: 35px;
            font-size: 2.2rem;
            color: #fff;
            cursor: pointer;
            opacity: 0.7;
        }
        /* 登录弹窗样式 */
        .login-mask {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-box {
            width: 100%;
            max-width: 420px;
            background: rgba(22, 30, 55, 0.8);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 220, 255, 0.3);
            border-radius: 16px;
            padding: 40px 30px;
            text-align: center;
        }
        .login-box h2 {
            font-size: 1.8rem;
            background: linear-gradient(90deg, #00d8ff, #8b5cf6);
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 24px;
            letter-spacing: 2px;
        }
        #pwdInput {
            width: 100%;
            padding: 14px 16px;
            border-radius: 8px;
            border: 1px solid #00a8ff60;
            background: rgba(0,0,0,0.4);
            color: #fff;
            font-size: 16px;
            outline: none;
            margin-bottom: 16px;
        }
        #loginBtn {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(90deg, #0099e5, #6c2bd9);
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }
        #loginBtn:hover {
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.4);
        }
        .login-tip {
            color: #ff6b6b;
            font-size: 14px;
            height: 20px;
            margin-bottom: 10px;
        }
        .logout-box {
            text-align: center;
            margin-bottom: 1rem;
        }
        #logoutBtn {
            padding: 6px 16px;
            background: #442244;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        /* 未登录隐藏主体内容 */
        .main-wrap {
            display: none;
        }
    </style>
</head>
<body>
    <!-- 登录弹窗 -->
    <div class="login-mask" id="loginMask">
        <div class="login-box">
            <h2>私人壁纸库 验证登录</h2>
            <div class="login-tip" id="loginTip"></div>
            <input type="password" id="pwdInput" placeholder="请输入访问密码">
            <button id="loginBtn">确认登录</button>
        </div>
    </div>
    <!-- 主体内容（登录后才显示） -->
    <div class="main-wrap" id="mainWrap">
        <div class="container">
            <header>
                <h1>私人壁纸库（jialiqianjin）</h1>
                <p class="desc">写死代码永久展示 | 临时添加仅当前浏览器生效</p>
            </div>
            <div class="logout-box">
                <button id="logoutBtn">退出登录</button>
            </div>
            <!-- 顶部导航栏：新增游戏按钮 -->
            <div class="nav-bar">
                <button class="nav-btn active" data-target="wallModule">壁纸</button>
                <button class="nav-btn" data-target="toolModule">极域反杀</button>
                <button class="nav-btn" data-target="gameModule">游戏</button>
            </div>
            <!-- 模块1：壁纸模块 -->
            <div class="module show" id="wallModule">
                <div class="tool-bar">
                    <button class="tool-btn" id="exportBtn">导出全部链接JSON</button>
                    <input type="file" id="import-file" accept=".json">
                </div>
                <div class="add-link-box">
                    <input id="linkInput" placeholder="临时添加图片/视频（换设备消失，永久需写进代码）">
                    <br>
                    <button id="addTempBtn">临时添加（本地缓存）</button>
                    <p style="color:#aaa;margin-top:8px;font-size:13px;">⚠️ 想要换设备也显示，必须把链接加到下方JS的fixedImages数组，重新上传页面</p>
                </div>
                <div class="wall-grid" id="wallGrid">
                    <div class="empty">加载中...</div>
                </div>
            </div>
            <!-- 模块2：极域反杀工具模块 -->
            <div class="module" id="toolModule">
                <!-- 原有极域工具包 -->
                <div class="tool-card">
                    <h3>极域工具包</h3>
                    <p>解除机房极域电子教室限制工具</p>
                    <a class="download-exe" href="https://link.jiyiho.cn/orfile/down.php/08647e6775a2b7c85db35cbb2bb3e1d4.exe" target="_blank">点击下载exe</a>
                </div>
                <!-- 夕颜如雪工具箱 -->
                <div class="tool-card">
                    <h3>夕颜如雪工具箱</h3>
                    <p>多功能机房解除限制工具箱</p>
                    <a class="download-exe" href="https://easylink.cc/11e6ix" target="_blank">前往工具箱</a>
                </div>
            </div>
            <!-- 模块3：新增游戏模块 -->
            <div class="module" id="gameModule">
                <div class="tool-card">
                    <h3>LMFP联机软件</h3>
                    <p>游戏联机工具软件</p>
                    <a class="download-exe" href="https://easylink.cc/zzlzyk" target="_blank">前往下载/使用</a>
                </div>
            </div>
        </div>
    </div>
    <div class="preview-mask" id="previewMask">
        <span class="close-preview" id="closePreview">×</span>
        <img id="previewImg" src="" alt="大图预览" style="display: none;">
        <video id="previewVideo" controls style="display: none;"></video>
    </div>
    <script>
        // ===================== 配置区 =====================
        const ACCESS_PASSWORD = "a12345678945";
        const LOGIN_STORAGE_KEY = "wallLoginAuth";
        // =================================================
        // 永久壁纸数组（你提供的6张动漫壁纸）
        const fixedImages = [
              // 原有图片壁纸
            "https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAEVse9qM3ZwqHjkQCkkZS2xCvMavSz70QACFiMAAoLBoVXyysCgPKPgXTwE.jpg",
            "https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAEVsgRqM3jGTgnr3syb7ztuclcHt35fSgACMCMAAoLBoVXG6YvfK6qc6TwE.png",
            "https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAEVsjFqM30AAXyA1uSlDvi_HxgRK_BoRM0AAnQjAAKCwaFVfapo5nroNFs8BA.png",
            "https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAEVwBdqNM_f6WSiZ9ZqyWp99HA1qvkP9gACmyAAAmzbqFXqtxyKJyeGUjwE.png",
            // 本次新增PNG图片
            "https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAEV0RJqN4aVBGoLRDwwc4cAAR-bnhWz37EAAs4jAALn07lVJaP7ROcLZDw8BA.png",
            // 动态视频壁纸1
            "https://cropgif.net/videos/1782022932124-66a03516-a7e6-4d51-adc9-ab4ae0923174.mp4",
            // 动态视频壁纸2
            "https://cropgif.net/videos/1782023395596-f40b26d1-fcf6-4a84-bb91-19fcdcfdd61f.mp4"
        ];
        // DOM元素
        const loginMask = document.getElementById("loginMask");
        const mainWrap = document.getElementById("mainWrap");
        const pwdInput = document.getElementById("pwdInput");
        const loginBtn = document.getElementById("loginBtn");
        const loginTip = document.getElementById("loginTip");
        const logoutBtn = document.getElementById("logoutBtn");
        const wallGrid = document.getElementById('wallGrid');
        const previewMask = document.getElementById('previewMask');
        const previewImg = document.getElementById('previewImg');
        const previewVideo = document.getElementById('previewVideo');
        const closePreview = document.getElementById('closePreview');
        const exportBtn = document.getElementById('exportBtn');
        const importFile = document.getElementById('import-file');
        const linkInput = document.getElementById('linkInput');
        const addTempBtn = document.getElementById('addTempBtn');
        const navBtns = document.querySelectorAll(".nav-btn");
        const modules = document.querySelectorAll(".module");
        // 导航切换逻辑（自动兼容新增游戏模块）
        navBtns.forEach(btn => {
            btn.onclick = () => {
                const targetId = btn.dataset.target;
                // 清除所有激活
                navBtns.forEach(b => b.classList.remove("active"));
                modules.forEach(m => m.classList.remove("show"));
                // 激活当前
                btn.classList.add("active");
                document.getElementById(targetId).classList.add("show");
            }
        });
        // 本地临时壁纸
        let tempList = JSON.parse(localStorage.getItem('tempWall')) || [];
        // 登录校验
        function checkLogin() {
            const isLogin = localStorage.getItem(LOGIN_STORAGE_KEY) === "ok";
            if (isLogin) {
                loginMask.style.display = "none";
                mainWrap.style.display = "block";
                renderWall();
            } else {
                loginMask.style.display = "flex";
                mainWrap.style.display = "none";
            }
        }
        // 登录操作
        function doLogin() {
            loginTip.textContent = "";
            const pwd = pwdInput.value.trim();
            if (!pwd) {
                loginTip.textContent = "请输入密码";
                return;
            }
            if (pwd !== ACCESS_PASSWORD) {
                loginTip.textContent = "密码错误，请重新输入";
                pwdInput.value = "";
                return;
            }
            localStorage.setItem(LOGIN_STORAGE_KEY, "ok");
            checkLogin();
        }
        // 退出登录
        function doLogout() {
            localStorage.removeItem(LOGIN_STORAGE_KEY);
            checkLogin();
            pwdInput.value = "";
        }
        // 绑定登录事件
        loginBtn.onclick = doLogin;
        pwdInput.onkeydown = e => {
            if (e.key === "Enter") doLogin();
        };
        logoutBtn.onclick = doLogout;
        // 判断媒体类型
        function getMediaType(url) {
            const ext = url.split('.').pop().toLowerCase();
            if (['jpg','jpeg','png','gif','webp','bmp'].includes(ext)) {
                return 'image';
            } else if (['mp4','webm','mov','avi','mkv'].includes(ext)) {
                return 'video';
            }
            return 'unknown';
        }
        // 合并壁纸列表
        function getAllImages() {
            const arr = [];
            fixedImages.forEach(url => arr.push({url, type: getMediaType(url)}));
            tempList.forEach(item => {
                if (!item.type) item.type = getMediaType(item.url);
                arr.push(item);
            });
            return arr;
        }
        // 渲染壁纸
        function renderWall() {
            const all = getAllImages();
            if (all.length === 0) {
                wallGrid.innerHTML = '<div class="empty">暂无壁纸</div>';
                return;
            }
            let html = '';
            all.forEach(item => {
                if (item.type === 'image') {
                    html += `
                    <div class="wall-card">
                        <img src="${item.url}" alt="壁纸" class="preview-item" data-type="image" data-src="${item.url}">
                        <div class="card-action">
                            <a href="${item.url}" target="_blank" class="down-btn">下载原图</a>
                        </div>
                    </div>
                    `;
                } else if (item.type === 'video') {
                    html += `
                    <div class="wall-card">
                        <video muted loop preload="metadata" class="preview-item" data-type="video" data-src="${item.url}">
                            <source src="${item.url}" type="video/mp4">
                        </video>
                        <div class="card-action">
                            <a href="${item.url}" target="_blank" class="down-btn">下载视频</a>
                        </div>
                    </div>
                    `;
                }
            });
            wallGrid.innerHTML = html;
            bindPreview();
        }
        // 大图预览绑定
        function bindPreview() {
            document.querySelectorAll('.preview-item').forEach(item => {
                item.onclick = () => {
                    const type = item.dataset.type;
                    const src = item.dataset.src;
                    previewImg.style.display = 'none';
                    previewVideo.style.display = 'none';
                    if (type === 'image') {
                        previewImg.src = src;
                        previewImg.style.display = 'block';
                    } else {
                        previewVideo.src = src;
                        previewVideo.style.display = 'block';
                        previewVideo.play();
                    }
                    previewMask.style.display = 'flex';
                }
            });
        }
        // 关闭预览
        closePreview.onclick = () => {
            previewMask.style.display = 'none';
            previewVideo.pause();
        };
        previewMask.onclick = (e) => {
            if (e.target === previewMask) {
                previewMask.style.display = 'none';
                previewVideo.pause();
            }
        }
        // 临时添加素材
        addTempBtn.onclick = () => {
            const url = linkInput.value.trim();
            if (!url) return alert("请输入图片/视频链接");
            const type = getMediaType(url);
            if (type === 'unknown') return alert("不支持的文件类型");
            tempList.push({url, type});
            localStorage.setItem('tempWall', JSON.stringify(tempList));
            linkInput.value = "";
            renderWall();
            alert(`${type === 'image' ? '图片' : '视频'}临时添加成功，换设备失效`);
        }
        // 导出链接
        exportBtn.onclick = () => {
            const all = getAllImages().map(i => i.url);
            const json = JSON.stringify(all, null, 2);
            const blob = new Blob([json], {type:"application/json"});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "全部壁纸链接.json";
            a.click();
            URL.revokeObjectURL(a.href);
        }
        // 初始化登录检测
        checkLogin();
    </script>
</body>
</html>
