<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私人壁纸库（纯链接版）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }
        body {
            background: #050816;
            background-image: radial-gradient(circle at 50% 20%, #101730 0%, #050816 70%);
            color: #fff;
            min-height: 100vh;
            padding: 2rem 1rem;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            padding: 2rem 0;
            border-bottom: 1px solid rgba(0, 220, 255, 0.2);
            margin-bottom: 2rem;
        }
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00d8ff, #8b5cf6);
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: 6px;
        }
        .desc {
            color: rgba(255,255,0.5);
            margin-top: 0.8rem;
        }
        .tool-bar {
            text-align: center;
            margin-bottom: 1.5rem;
            gap: 12px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }
        .tool-btn {
            padding: 8px 20px;
            background: linear-gradient(90deg, #224488, #5522aa);
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
        }
        .tool-btn:hover {
            box-shadow: 0 0 12px rgba(0, 216, 255, 0.4);
        }
        #import-file {
            display: none;
        }
        .add-link-box {
            background: rgba(25, 35, 60, 0.5);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 220, 255, 0.3);
            border-radius: 16px;
            padding: 2rem;
            text-align: center;
            margin-bottom: 2.5rem;
        }
        #linkInput {
            width: 100%;
            max-width: 800px;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #00a8ff60;
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 14px;
            outline: none;
        }
        #addLinkBtn {
            margin-top: 12px;
            padding: 10px 28px;
            background: linear-gradient(90deg, #00a8ff, #7b2cbf);
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            font-size: 1rem;
        }
        .wall-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 24px;
        }
        .wall-card {
            background: rgba(25, 35, 60, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 220, 255, 0.25);
            border-radius 12px;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .wall-card:hover {
            transform: translateY(-8px);
            border-color: rgba(0, 220, 255, 0.6);
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.35);
        }
        .wall-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
            cursor: pointer;
        }
        .card-action {
            padding: 15px;
            text-align: center;
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .down-btn, .del-btn {
            padding: 7px 16px;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            font-size: 0.85rem;
            transition: 0.2s;
            border: none;
            cursor: pointer;
        }
        .down-btn {
            background: linear-gradient(90deg, #0099e5, #6c2bd9);
        }
        .del-btn {
            background: linear-gradient(90deg, #c53030, #922b2b);
        }
        .empty {
            grid-column: 1 / -1;
            text-align: center;
            color: rgba(255,255,0.3);
            padding: 3rem 0;
        }
        .preview-mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.92);
            z-index: 999;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .preview-mask img {
            max-width: 95%;
            max-height: 95%;
            object-fit: contain;
        }
        .close-preview {
            position: absolute;
            top: 25px;
            right: 35px;
            font-size: 2.2rem;
            color: #fff;
            cursor: pointer;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>私人壁纸库（纯链接版）</h1>
            <p class="desc">粘贴图片链接 / JSON导入 / 本地保存</p>
        </header>
        <div class="tool-bar">
            <button class="tool-btn" id="exportBtn">导出壁纸列表JSON</button>
            <button class="tool-btn" id="importBtn">导入壁纸列表JSON</button>
            <input type="file" id="import-file" accept=".json">
        </div>

        <!-- 手动粘贴单张图片链接 -->
        <div class="add-link-box">
            <input id="linkInput" placeholder="粘贴图片网络链接，例如 https://xxx.jpg">
            <br>
            <button id="addLinkBtn">添加该壁纸</button>
        </div>

        <div class="wall-grid" id="wallGrid">
            <div class="empty">暂无壁纸，请粘贴图片链接或导入JSON文件</div>
        </div>
    </div>

    <div class="preview-mask" id="previewMask">
        <span class="close-preview" id="closePreview">×</span>
        <img id="previewImg" src="" alt="大图预览">
    </div>

    <script>
        const wallGrid = document.getElementById('wallGrid');
        const previewMask = document.getElementById('previewMask');
        const previewImg = document.getElementById('previewImg');
        const closePreview = document.getElementById('closePreview');
        const exportBtn = document.getElementById('exportBtn');
        const importBtn = document.getElementById('importBtn');
        const importFile = document.getElementById('import-file');
        const linkInput = document.getElementById('linkInput');
        const addLinkBtn = document.getElementById('addLink');

        // 本地存储壁纸链接数组
        let wallList = JSON.parse(localStorage.getItem('wallpaperList')) || [];

        // 添加单条图片链接
        addLinkBtn.addEventListener('click', () => {
            const url = linkInput.value.trim();
            if (!url) {
                alert("请输入图片链接");
                return;
            }
            // 简单校验图片后缀
            const ext = url.split('.').pop().toLowerCase();
            if (!['jpg','jpeg','png','gif','webp'].includes(ext)) {
                alert("链接不是图片格式，请检查");
                return;
            }
            wallList.push({url});
            localStorage.setItem('wallpaperList', JSON.stringify(wallList));
            linkInput.value = "";
            renderWall();
            alert("添加成功");
        });

        // 渲染全部壁纸卡片
        function renderWall() {
            if (wallList.length === 0) {
                wallGrid.innerHTML = '<div class="empty">暂无壁纸，请粘贴图片链接或导入JSON文件</div>';
                return;
            }
            let html = '';
            wallList.forEach((item, index) => {
                html += `
                <div class="wall-card" data-index="${index}">
                    <img src="${item.url}" alt="壁纸" class="preview-img" data-src="${item.url}">
                    <div class="card-action">
                        <a href="${item.url}" target="_blank" class="down-btn">下载原图</a>
                        <button class="del-btn" data-index="${index}">删除</button>
                    </div>
                </div>
                `;
            });
            wallGrid.innerHTML = html;
            bindCardEvent();
        }

        // 绑定预览、删除事件
        function bindCardEvent() {
            document.querySelectorAll('.preview-img').forEach(img => {
                img.onclick = () => {
                    previewImg.src = img.dataset.src;
                    previewMask.style.display = 'flex';
                }
            });
            document.querySelectorAll('.del-btn').forEach(btn => {
                btn.onclick = () => {
                    const idx = Number(btn.dataset.index);
                    if (confirm("确定删除这张壁纸？仅删除本地记录，不会删除原图链接")) {
                        wallList.splice(idx,1);
                        localStorage.setItem('wallpaperList', JSON.stringify(wallList));
                        renderWall();
                    }
                }
            });
        }

        // 关闭大图预览
        closePreview.onclick = () => previewMask.style.display = 'none';
        previewMask.onclick = (e) => {
            if (e.target === previewMask) previewMask.style.display = 'none';
        }

        // 导出JSON备份
        exportBtn.onclick = () => {
            const jsonStr = JSON.stringify(wallList, null, 2);
            const blob = new Blob([jsonStr], {type:"application/json"});
            const a = document.createElement('a');
            a.href = URL.createObject(blob);
            a.download = "壁纸备份.json";
            a.click();
            URL.revokeObjectURL(a.href);
        }

        // 导入JSON文件
        importBtn.onclick = () => importFile.click();
        importFile.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = ev => {
                try {
                    const data = JSON.parse(ev.target.result);
                    if (!Array.isArray(data)) throw Error("格式错误");
                    wallList = data;
                    localStorage.setItem('wallpaperList', JSON.stringify(wallList));
                    renderWall();
                    alert("导入成功");
                } catch {
                    alert("JSON文件损坏/格式不对");
                }
            }
            reader.readAsText(file);
            importFile.value = "";
        }

        // 页面初始化渲染
        renderWall();
    </script>
</body>
</html>
