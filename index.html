<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dz好图库（无登录版）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }
        body {
            background: #050816;
            background-image: radial-gradient(circle at 50% 20%, #101730 0%, #050816 70%);
            color: #fff;
            min-height: 100vh;
            padding: 2rem 1rem;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            padding: 2rem 0;
            border-bottom: 1px solid rgba(0, 220, 255, 0.2);
            margin-bottom: 2rem;
        }
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00d8ff, #8b5cf6);
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: 6px;
        }
        .desc {
            color: rgba(255,255,255,0.5);
            margin-top: 0.8rem;
        }
        .tool-bar {
            text-align: center;
            margin-bottom: 1.5rem;
            gap: 12px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }
        .tool-btn {
            padding: 8px 20px;
            background: linear-gradient(90deg, #224488, #5522aa);
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
        }
        .tool-btn:hover {
            box-shadow: 0 0 12px rgba(0, 216, 255, 0.4);
        }
        #import-file {
            display: none;
        }
        .add-link-box {
            background: rgba(25, 35, 60, 0.5);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 220, 255, 0.3);
            border-radius: 16px;
            padding: 2rem;
            text-align: center;
            margin-bottom: 2.5rem;
        }
        #linkInput {
            width: 100%;
            max-width: 800px;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #00a8ff60;
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 14px;
            outline: none;
        }
        #addTempBtn {
            margin-top: 12px;
            padding: 10px 28px;
            background: linear-gradient(90deg, #777, #444);
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            font-size: 1rem;
        }
        .wall-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 24px;
        }
        .wall-card {
            background: rgba(25, 35, 60, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 220, 255, 0.25);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .wall-card:hover {
            transform: translateY(-8px);
            border-color: rgba(0, 220, 255, 0.6);
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.35);
        }
        .wall-card img,
        .wall-card video {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
            cursor: pointer;
        }
        .wall-card video {
            background: #000;
        }
        .card-action {
            padding: 15px;
            text-align: center;
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .down-btn {
            padding: 7px 16px;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            font-size: 0.85rem;
            transition: 0.2s;
            border: none;
            cursor: pointer;
            background: linear-gradient(90deg, #0099e5, #6c2bd9);
        }
        .empty {
            grid-column: 1 / -1;
            text-align: center;
            color: rgba(255,255,255,0.3);
            padding: 3rem 0;
        }
        .preview-mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.92);
            z-index: 999;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .preview-mask img,
        .preview-mask video {
            max-width: 95%;
            max-height: 95%;
            object-fit: contain;
        }
        .preview-mask video {
            background: #000;
            max-height: 90vh;
        }
        .close-preview {
            position: absolute;
            top: 25px;
            right: 35px;
            font-size: 2.2rem;
            color: #fff;
            cursor: pointer;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>dz好图库（无登录版）</h1>
            <p class="desc">写死代码永久展示 | 临时添加仅当前浏览器生效</p>
        </header>

        <div class="tool-bar">
            <button class="tool-btn" id="exportBtn">导出全部链接JSON</button>
            <input type="file" id="import-file" accept=".json">
        </div>

        <div class="add-link-box">
            <input id="linkInput" placeholder="临时添加图片/视频（换设备消失，永久需写进代码）">
            <br>
            <button id="addTempBtn">临时添加（本地缓存）</button>
            <p style="color:#aaa;margin-top:8px;font-size:13px;">⚠️ 想要换设备也显示，必须把链接加到下方JS的fixedImages数组，重新上传页面</p>
        </div>

        <div class="wall-grid" id="wallGrid">
            <div class="empty">加载中...</div>
        </div>
    </div>

    <div class="preview-mask" id="previewMask">
        <span class="close-preview" id="closePreview">×</span>
        <img id="previewImg" src="" alt="大图预览" style="display: none;">
        <video id="previewVideo" controls style="display: none;"></video>
    </div>

    <script>
        // 永久壁纸数组：仅保留你最新的3张图片，删除所有旧图片、视频
        const fixedImages = [
            "https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAEV-VFqO16kpVOD52iPog-ZcGmoLsIqOAACPyIAAvQD2VXFTGjhhki41jwE.jpg",
            "https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAEV-VNqO168wzJrgweuxTzw_cUFRO4fYwACQSIAAvQD2VV1TSXCQpoNVTwE.jpg",
            "https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAEV-VRqO17eFhkWXnP04GQBm3cZvfBs0wACQiIAAvQD2VUedSo2a2LIvjwE.jpg"
        ];

        // DOM元素
        const wallGrid = document.getElementById('wallGrid');
        const previewMask = document.getElementById('previewMask');
        const previewImg = document.getElementById('previewImg');
        const previewVideo = document.getElementById('previewVideo');
        const closePreview = document.getElementById('closePreview');
        const exportBtn = document.getElementById('exportBtn');
        const importFile = document.getElementById('import-file');
        const linkInput = document.getElementById('linkInput');
        const addTempBtn = document.getElementById('addTempBtn');

        // 本地临时壁纸（仅当前浏览器，换设备丢失）
        let tempList = JSON.parse(localStorage.getItem('tempWall')) || [];

        // 判断链接类型（图片/视频）
        function getMediaType(url) {
            const ext = url.split('.').pop().toLowerCase();
            if (['jpg','jpeg','png','gif','webp','bmp'].includes(ext)) {
                return 'image';
            } else if (['mp4','webm','mov','avi','mkv'].includes(ext)) {
                return 'video';
            }
            return 'unknown';
        }

        // 合并固定永久壁纸 + 本地临时壁纸
        function getAllImages() {
            const arr = [];
            fixedImages.forEach(url => arr.push({url, type: getMediaType(url)}));
            tempList.forEach(item => {
                if (!item.type) {
                    item.type = getMediaType(item.url);
                }
                arr.push(item);
            });
            return arr;
        }

        // 渲染全部壁纸
        function renderWall() {
            const all = getAllImages();
            if (all.length === 0) {
                wallGrid.innerHTML = '<div class="empty">暂无壁纸</div>';
                return;
            }
            let html = '';
            all.forEach((item, index) => {
                if (item.type === 'image') {
                    html += `
                    <div class="wall-card">
                        <img src="${item.url}" alt="壁纸" class="preview-item" data-type="image" data-src="${item.url}">
                        <div class="card-action">
                            <a href="${item.url}" target="_blank" class="down-btn">下载原图</a>
                        </div>
                    </div>
                    `;
                } else if (item.type === 'video') {
                    html += `
                    <div class="wall-card">
                        <video muted loop preload="metadata" class="preview-item" data-type="video" data-src="${item.url}">
                            <source src="${item.url}" type="video/mp4">
                        </video>
                        <div class="card-action">
                            <a href="${item.url}" target="_blank" class="down-btn">下载视频</a>
                        </div>
                    </div>
                    `;
                }
            });
            wallGrid.innerHTML = html;
            bindPreview();
        }

        // 预览绑定
        function bindPreview() {
            document.querySelectorAll('.preview-item').forEach(item => {
                item.onclick = () => {
                    const type = item.dataset.type;
                    const src = item.dataset.src;
                    
                    previewImg.style.display = 'none';
                    previewVideo.style.display = 'none';
                    
                    if (type === 'image') {
                        previewImg.src = src;
                        previewImg.style.display = 'block';
                    } else if (type === 'video') {
                        previewVideo.src = src;
                        previewVideo.style.display = 'block';
                        previewVideo.play();
                    }
                    
                    previewMask.style.display = 'flex';
                }
            });
        }

        // 关闭预览
        closePreview.onclick = () => {
            previewMask.style.display = 'none';
            previewVideo.pause();
        };
        previewMask.onclick = (e) => {
            if (e.target === previewMask) {
                previewMask.style.display = 'none';
                previewVideo.pause();
            }
        }

        // 临时添加壁纸
        addTempBtn.onclick = () => {
            const url = linkInput.value.trim();
            if (!url) return alert("请输入图片/视频链接");
            
            const type = getMediaType(url);
            if (type === 'unknown') return alert("不支持的文件类型，请输入图片或视频链接");
            
            tempList.push({url, type});
            localStorage.setItem('tempWall', JSON.stringify(tempList));
            linkInput.value = "";
            renderWall();
            
            const tip = type === 'image' ? '图片' : '视频';
            alert(`${tip}临时添加成功，换设备会消失！永久展示请写入上方fixedImages数组`);
        }

        // 导出全部链接
        exportBtn.onclick = () => {
            const all = getAllImages().map(i => i.url);
            const json = JSON.stringify(all, null, 2);
            const blob = new Blob([json], {type:"application/json"});
            const a = document.createElement('a');
            a.href = URL.createObject(blob);
            a.download = "全部壁纸链接.json";
            a.click();
            URL.revokeObjectURL(a.href);
        }

        // 页面初始化渲染
        renderWall();
    </script>
</body>
</html>
